<!DOCTYPE html>

<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Select Date &amp; Time</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#4cae4f",
                        "background-light": "#f6f7f6",
                        "background-dark": "#151d15",
                    },
                    fontFamily: {
                        "display": ["Inter", "sans-serif"]
                    },
                    borderRadius: {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                },
            },
        }
    </script>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark font-display text-slate-900 dark:text-slate-100 antialiased">
<div class="relative mx-auto flex h-full min-h-screen max-w-md flex-col bg-white dark:bg-background-dark shadow-xl overflow-hidden">
<!-- Top Navigation -->
<header class="flex items-center bg-white dark:bg-background-dark p-4 border-b border-slate-100 dark:border-slate-800">
    <a href="home.html"><button class="text-slate-900 dark:text-slate-100 flex size-10 shrink-0 items-center justify-center rounded-full hover:bg-slate-100 dark:hover:bg-slate-800 transition-colors">
<span class="material-symbols-outlined">arrow_back</span>
</button></a>
<h2 class="text-slate-900 dark:text-slate-100 text-lg font-bold leading-tight tracking-tight flex-1 text-center pr-10">Select Date &amp; Time</h2>
</header>
<main class="flex-1 overflow-y-auto">
<!-- Calendar Section -->
<div class="p-4">
<div class="flex flex-col gap-2">
<!-- Month Selector -->
<div class="flex items-center justify-between mb-2">
<button class="flex size-10 items-center justify-center rounded-full hover:bg-slate-100 dark:hover:bg-slate-800">
<span class="material-symbols-outlined text-slate-600 dark:text-slate-400">chevron_left</span>
</button>
<p class="text-slate-900 dark:text-slate-100 text-base font-bold">August 2024</p>
<button class="flex size-10 items-center justify-center rounded-full hover:bg-slate-100 dark:hover:bg-slate-800">
<span class="material-symbols-outlined text-slate-600 dark:text-slate-400">chevron_right</span>
</button>
</div>
<!-- Calendar Grid -->
<div class="grid grid-cols-7 gap-y-1">
<div class="text-slate-400 text-xs font-bold flex h-10 w-full items-center justify-center">S</div>
<div class="text-slate-400 text-xs font-bold flex h-10 w-full items-center justify-center">M</div>
<div class="text-slate-400 text-xs font-bold flex h-10 w-full items-center justify-center">T</div>
<div class="text-slate-400 text-xs font-bold flex h-10 w-full items-center justify-center">W</div>
<div class="text-slate-400 text-xs font-bold flex h-10 w-full items-center justify-center">T</div>
<div class="text-slate-400 text-xs font-bold flex h-10 w-full items-center justify-center">F</div>
<div class="text-slate-400 text-xs font-bold flex h-10 w-full items-center justify-center">S</div>
<!-- Spacer for start of month (Thursday start for Aug 2024) -->
<div class="h-10 w-full col-span-4"></div>
<!-- Calendar Days -->
<button class="h-10 w-full text-slate-900 dark:text-slate-100 text-sm font-medium"><div class="flex size-9 mx-auto items-center justify-center rounded-lg hover:bg-slate-100 dark:hover:bg-slate-800">1</div></button>
<button class="h-10 w-full text-slate-900 dark:text-slate-100 text-sm font-medium"><div class="flex size-9 mx-auto items-center justify-center rounded-lg hover:bg-slate-100 dark:hover:bg-slate-800">2</div></button>
<button class="h-10 w-full text-slate-900 dark:text-slate-100 text-sm font-medium"><div class="flex size-9 mx-auto items-center justify-center rounded-lg hover:bg-slate-100 dark:hover:bg-slate-800">3</div></button>
<button class="h-10 w-full text-slate-900 dark:text-slate-100 text-sm font-medium"><div class="flex size-9 mx-auto items-center justify-center rounded-lg hover:bg-slate-100 dark:hover:bg-slate-800">4</div></button>
<button class="h-10 w-full text-slate-900 dark:text-slate-100 text-sm font-medium"><div class="flex size-9 mx-auto items-center justify-center rounded-lg hover:bg-slate-100 dark:hover:bg-slate-800">5</div></button>
<button class="h-10 w-full text-slate-900 dark:text-slate-100 text-sm font-medium"><div class="flex size-9 mx-auto items-center justify-center rounded-lg hover:bg-slate-100 dark:hover:bg-slate-800">6</div></button>
<button class="h-10 w-full text-slate-900 dark:text-slate-100 text-sm font-medium"><div class="flex size-9 mx-auto items-center justify-center rounded-lg hover:bg-slate-100 dark:hover:bg-slate-800">7</div></button>
<button class="h-10 w-full text-slate-900 dark:text-slate-100 text-sm font-medium"><div class="flex size-9 mx-auto items-center justify-center rounded-lg hover:bg-slate-100 dark:hover:bg-slate-800">8</div></button>
<button class="h-10 w-full text-slate-900 dark:text-slate-100 text-sm font-medium"><div class="flex size-9 mx-auto items-center justify-center rounded-lg hover:bg-slate-100 dark:hover:bg-slate-800">9</div></button>
<button class="h-10 w-full text-slate-900 dark:text-slate-100 text-sm font-medium"><div class="flex size-9 mx-auto items-center justify-center rounded-lg hover:bg-slate-100 dark:hover:bg-slate-800">10</div></button>
<button class="h-10 w-full text-slate-900 dark:text-slate-100 text-sm font-medium"><div class="flex size-9 mx-auto items-center justify-center rounded-lg hover:bg-slate-100 dark:hover:bg-slate-800">11</div></button>
<button class="h-10 w-full text-slate-900 dark:text-slate-100 text-sm font-medium"><div class="flex size-9 mx-auto items-center justify-center rounded-lg hover:bg-slate-100 dark:hover:bg-slate-800">12</div></button>
<button class="h-10 w-full text-slate-900 dark:text-slate-100 text-sm font-medium"><div class="flex size-9 mx-auto items-center justify-center rounded-lg hover:bg-slate-100 dark:hover:bg-slate-800">13</div></button>
<button class="h-10 w-full text-slate-900 dark:text-slate-100 text-sm font-medium"><div class="flex size-9 mx-auto items-center justify-center rounded-lg hover:bg-slate-100 dark:hover:bg-slate-800">14</div></button>
<button class="h-10 w-full text-slate-900 dark:text-slate-100 text-sm font-medium"><div class="flex size-9 mx-auto items-center justify-center rounded-lg hover:bg-slate-100 dark:hover:bg-slate-800">15</div></button>
<button class="h-10 w-full text-slate-900 dark:text-slate-100 text-sm font-medium"><div class="flex size-9 mx-auto items-center justify-center rounded-lg hover:bg-slate-100 dark:hover:bg-slate-800">16</div></button>
<!-- Selected Date: Aug 17 -->
<button class="h-10 w-full text-white text-sm font-bold">
<div class="flex size-9 mx-auto items-center justify-center rounded-lg bg-primary shadow-sm shadow-primary/40">17</div>
</button>
<button class="h-10 w-full text-slate-900 dark:text-slate-100 text-sm font-medium"><div class="flex size-9 mx-auto items-center justify-center rounded-lg hover:bg-slate-100 dark:hover:bg-slate-800">18</div></button>
<button class="h-10 w-full text-slate-900 dark:text-slate-100 text-sm font-medium"><div class="flex size-9 mx-auto items-center justify-center rounded-lg hover:bg-slate-100 dark:hover:bg-slate-800">19</div></button>
<button class="h-10 w-full text-slate-900 dark:text-slate-100 text-sm font-medium"><div class="flex size-9 mx-auto items-center justify-center rounded-lg hover:bg-slate-100 dark:hover:bg-slate-800">20</div></button>
<button class="h-10 w-full text-slate-900 dark:text-slate-100 text-sm font-medium"><div class="flex size-9 mx-auto items-center justify-center rounded-lg hover:bg-slate-100 dark:hover:bg-slate-800">21</div></button>
<button class="h-10 w-full text-slate-900 dark:text-slate-100 text-sm font-medium"><div class="flex size-9 mx-auto items-center justify-center rounded-lg hover:bg-slate-100 dark:hover:bg-slate-800">22</div></button>
<button class="h-10 w-full text-slate-900 dark:text-slate-100 text-sm font-medium"><div class="flex size-9 mx-auto items-center justify-center rounded-lg hover:bg-slate-100 dark:hover:bg-slate-800">23</div></button>
<button class="h-10 w-full text-slate-900 dark:text-slate-100 text-sm font-medium"><div class="flex size-9 mx-auto items-center justify-center rounded-lg hover:bg-slate-100 dark:hover:bg-slate-800">24</div></button>
<button class="h-10 w-full text-slate-900 dark:text-slate-100 text-sm font-medium"><div class="flex size-9 mx-auto items-center justify-center rounded-lg hover:bg-slate-100 dark:hover:bg-slate-800">25</div></button>
<button class="h-10 w-full text-slate-900 dark:text-slate-100 text-sm font-medium"><div class="flex size-9 mx-auto items-center justify-center rounded-lg hover:bg-slate-100 dark:hover:bg-slate-800">26</div></button>
<button class="h-10 w-full text-slate-900 dark:text-slate-100 text-sm font-medium"><div class="flex size-9 mx-auto items-center justify-center rounded-lg hover:bg-slate-100 dark:hover:bg-slate-800">27</div></button>
<button class="h-10 w-full text-slate-900 dark:text-slate-100 text-sm font-medium"><div class="flex size-9 mx-auto items-center justify-center rounded-lg hover:bg-slate-100 dark:hover:bg-slate-800">28</div></button>
<button class="h-10 w-full text-slate-900 dark:text-slate-100 text-sm font-medium"><div class="flex size-9 mx-auto items-center justify-center rounded-lg hover:bg-slate-100 dark:hover:bg-slate-800">29</div></button>
<button class="h-10 w-full text-slate-900 dark:text-slate-100 text-sm font-medium"><div class="flex size-9 mx-auto items-center justify-center rounded-lg hover:bg-slate-100 dark:hover:bg-slate-800">30</div></button>
<button class="h-10 w-full text-slate-900 dark:text-slate-100 text-sm font-medium"><div class="flex size-9 mx-auto items-center justify-center rounded-lg hover:bg-slate-100 dark:hover:bg-slate-800">31</div></button>
</div>
</div>
</div>
<!-- Time Period Selection -->
<div class="px-4 pt-6">
<h3 class="text-slate-900 dark:text-slate-100 text-lg font-bold leading-tight tracking-tight mb-4">Select Time Period</h3>
<div class="flex h-11 items-center justify-center rounded-xl bg-slate-100 dark:bg-slate-800 p-1">
<label class="flex cursor-pointer h-full grow items-center justify-center overflow-hidden rounded-lg px-2 has-[:checked]:bg-white dark:has-[:checked]:bg-slate-700 has-[:checked]:shadow-sm text-slate-500 dark:text-slate-400 has-[:checked]:text-primary text-sm font-semibold transition-all">
<span class="truncate">Morning</span>
<input checked="" class="hidden" name="time-period" type="radio" value="Morning"/>
</label>
<label class="flex cursor-pointer h-full grow items-center justify-center overflow-hidden rounded-lg px-2 has-[:checked]:bg-white dark:has-[:checked]:bg-slate-700 has-[:checked]:shadow-sm text-slate-500 dark:text-slate-400 has-[:checked]:text-primary text-sm font-semibold transition-all">
<span class="truncate">Afternoon</span>
<input class="hidden" name="time-period" type="radio" value="Afternoon"/>
</label>
<label class="flex cursor-pointer h-full grow items-center justify-center overflow-hidden rounded-lg px-2 has-[:checked]:bg-white dark:has-[:checked]:bg-slate-700 has-[:checked]:shadow-sm text-slate-500 dark:text-slate-400 has-[:checked]:text-primary text-sm font-semibold transition-all">
<span class="truncate">Evening</span>
<input class="hidden" name="time-period" type="radio" value="Evening"/>
</label>
</div>
</div>
<!-- Specific Time Slots -->
<div class="px-4 py-6 mb-24">
<h3 class="text-slate-900 dark:text-slate-100 text-lg font-bold leading-tight tracking-tight mb-4">Available Slots</h3>
<div class="grid grid-cols-3 gap-3">
<button class="flex items-center justify-center py-3 px-2 border-2 border-slate-100 dark:border-slate-800 rounded-xl text-sm font-semibold hover:border-primary/50 transition-colors">8:00 AM</button>
<!-- Active/Selected Slot -->
<button class="flex items-center justify-center py-3 px-2 bg-primary/10 border-2 border-primary rounded-xl text-sm font-bold text-primary transition-colors">8:30 AM</button>
<button class="flex items-center justify-center py-3 px-2 border-2 border-slate-100 dark:border-slate-800 rounded-xl text-sm font-semibold hover:border-primary/50 transition-colors">9:00 AM</button>
<button class="flex items-center justify-center py-3 px-2 border-2 border-slate-100 dark:border-slate-800 rounded-xl text-sm font-semibold hover:border-primary/50 transition-colors">9:30 AM</button>
<button class="flex items-center justify-center py-3 px-2 border-2 border-slate-100 dark:border-slate-800 rounded-xl text-sm font-semibold hover:border-primary/50 transition-colors">10:00 AM</button>
<button class="flex items-center justify-center py-3 px-2 border-2 border-slate-100 dark:border-slate-800 rounded-xl text-sm font-semibold hover:border-primary/50 transition-colors">10:30 AM</button>
<!-- Disabled/Unavailable Slot -->
<button class="flex items-center justify-center py-3 px-2 border-2 border-slate-50 dark:border-slate-900 rounded-xl text-sm font-medium text-slate-300 dark:text-slate-700 cursor-not-allowed bg-slate-50/50 dark:bg-slate-900/50" disabled="">11:00 AM</button>
<button class="flex items-center justify-center py-3 px-2 border-2 border-slate-100 dark:border-slate-800 rounded-xl text-sm font-semibold hover:border-primary/50 transition-colors">11:30 AM</button>
<button class="flex items-center justify-center py-3 px-2 border-2 border-slate-100 dark:border-slate-800 rounded-xl text-sm font-semibold hover:border-primary/50 transition-colors">12:00 PM</button>
</div>
</div>
</main>
<!-- Fixed Footer CTA -->
<footer class="absolute bottom-0 left-0 right-0 p-4 bg-white/80 dark:bg-background-dark/80 backdrop-blur-md border-t border-slate-100 dark:border-slate-800">
    <a href="session.html"><button class="w-full bg-primary hover:bg-primary/90 text-white font-bold py-4 rounded-xl shadow-lg shadow-primary/20 transition-all flex items-center justify-center gap-2">
                Continue
                <span class="material-symbols-outlined text-[20px]">arrow_forward</span>
</button></a>
</footer>
</div>
</body></html>
